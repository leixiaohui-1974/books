name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'multi-agent-writer/**'
  pull_request:
    branches: [main]
    paths:
      - 'multi-agent-writer/**'

defaults:
  run:
    working-directory: multi-agent-writer

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('multi-agent-writer/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=hydroscribe --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: multi-agent-writer/coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check hydroscribe/ tests/

      - name: Check linting
        run: ruff check hydroscribe/ tests/

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hydroscribe:test .
        working-directory: multi-agent-writer

      - name: Test Docker image
        run: |
          docker run --rm hydroscribe:test python -c "import hydroscribe; print(hydroscribe.__version__)"
        working-directory: multi-agent-writer
