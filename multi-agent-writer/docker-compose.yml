# HydroScribe + OpenClaw 多智能体协同部署 (阿里云优化版)
# 用法:
#   docker compose up -d                    # 启动 HydroScribe
#   OPENCLAW_ENABLED=true docker compose up # 启用 OpenClaw 集成
#
# 环境变量:
#   DASHSCOPE_API_KEY  - 阿里云百炼 API Key（推荐）
#   LLM_API_KEY        - 通用 LLM API Key
#   LLM_PROVIDER       - LLM 提供商 (alibaba_bailian/openai/anthropic/local)

version: '3.8'

services:
  # ── HydroScribe 主服务 ─────────────────────────────────────────
  hydroscribe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydroscribe_api
    ports:
      - "${HYDROSCRIBE_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
      - books_data:/data/books
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - BOOKS_ROOT=/data/books
      - HYDROSCRIBE_SERVER_HOST=0.0.0.0
      - HYDROSCRIBE_SERVER_PORT=8000
      - HYDROSCRIBE_LOG_LEVEL=${LOG_LEVEL:-info}
      # LLM 配置
      - HYDROSCRIBE_LLM_PROVIDER=${LLM_PROVIDER:-alibaba_bailian}
      - HYDROSCRIBE_LLM_MODEL=${LLM_MODEL:-qwen-plus}
      - HYDROSCRIBE_LLM_API_KEY=${LLM_API_KEY:-}
      - HYDROSCRIBE_LLM_BASE_URL=${LLM_BASE_URL:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      # 编排器
      - HYDROSCRIBE_GATE_MODE=${GATE_MODE:-auto}
      # OpenClaw
      - HYDROSCRIBE_OPENCLAW_ENABLED=${OPENCLAW_ENABLED:-false}
      - HYDROSCRIBE_OPENCLAW_URL=http://openclaw_gateway:3000
    restart: unless-stopped
    networks:
      - hydroscribe_network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/status').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── OpenClaw 网关（可选）────────────────────────────────────────
  # 取消注释启用 OpenClaw 集成
  # openclaw:
  #   image: openclaw/gateway:latest
  #   container_name: openclaw_gateway
  #   ports:
  #     - "${OPENCLAW_PORT:-3000}:3000"
  #     - "${OPENCLAW_WEB_PORT:-80}:80"
  #   volumes:
  #     - ./openclaw/config:/app/config
  #     - ./openclaw/skills:/app/skills
  #   environment:
  #     - OPENCLAW_LLM_API_KEY=${OPENCLAW_LLM_API_KEY:-}
  #     - OPENCLAW_LLM_BASE_URL=${OPENCLAW_LLM_BASE_URL:-}
  #   restart: unless-stopped
  #   networks:
  #     - hydroscribe_network
  #   depends_on:
  #     hydroscribe:
  #       condition: service_healthy

volumes:
  books_data:
    driver: local

networks:
  hydroscribe_network:
    driver: bridge
